# rez-utilities-platform - Deploys all utilities together
services:
  - type: web
    name: rez-utilities-platform
    env: node
    region: singapore
    buildCommand: npm install && npm run build --workspaces
    startCommand: bash start.sh
    healthCheckPath: health
    autoDeploy: yes
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
