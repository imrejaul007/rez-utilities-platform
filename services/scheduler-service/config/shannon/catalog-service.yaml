description: "REZ Catalog Service — product/category/menu management. Key risks: IDOR on merchant products (edit competitor menus), mass assignment on product creation, injection in search/filter params, unauthorized category creation."

authentication:
  login_type: form
  login_url: "STAGING_URL/auth/login"
  credentials:
    username: "test-merchant@rez.money"
    password: "SHANNON_TEST_PASSWORD"

  login_flow:
    - "Send POST request to $login_url with JSON body containing email=$username and password=$password"
    - "Store the returned JWT token as Bearer"

  success_condition:
    type: url_contains
    value: "/"

rules:
  focus:
    - description: "Test IDOR — edit products belonging to other merchants"
      type: path
      url_path: "/products"
    - description: "Test injection in search and filter parameters"
      type: path
      url_path: "/search"
    - description: "Test mass assignment on product fields"
      type: path
      url_path: "/create"
    - description: "Test category hierarchy manipulation"
      type: path
      url_path: "/categories"

pipeline:
  max_concurrent_pipelines: 2
