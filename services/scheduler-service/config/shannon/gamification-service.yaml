description: "REZ Gamification Service — points, badges, streaks, leaderboards, BullMQ event processing. Key risks: event replay to inflate points, IDOR on leaderboard entries, unauthorized badge assignment, queue injection via malformed events."

authentication:
  login_type: form
  login_url: "STAGING_URL/auth/login"
  credentials:
    username: "test-merchant@rez.money"
    password: "SHANNON_TEST_PASSWORD"

  login_flow:
    - "Send POST request to $login_url with JSON body containing email=$username and password=$password"
    - "Store the returned JWT token as Bearer"

  success_condition:
    type: url_contains
    value: "/"

rules:
  focus:
    - description: "Test event replay to inflate points"
      type: path
      url_path: "/events"
    - description: "Test IDOR on user gamification profiles"
      type: path
      url_path: "/users"
    - description: "Test unauthorized badge/achievement assignment"
      type: path
      url_path: "/badges"
    - description: "Test X-Internal-Token bypass on internal endpoints"
      type: path
      url_path: "/internal"

pipeline:
  max_concurrent_pipelines: 2
